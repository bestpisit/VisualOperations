apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ include "visops.fullname" . | trim }}-deployment"
  labels:
    app: "{{ include "visops.fullname" . | trim }}"
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit | default 2 }}
  selector:
    matchLabels:
      app: "{{ include "visops.fullname" . | trim }}"
  template:
    metadata:
      labels:
        app: "{{ include "visops.fullname" . | trim }}"
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: "{{ include "visops.fullname" . | trim }}"
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: "{{ include "visops.fullname" . | trim }}-secret"
                  key: AUTH_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: "{{ include "visops.fullname" . | trim }}-secret"
                  key: DATABASE_URL
            - name: AUTH_TRUST_HOST
              valueFrom:
                configMapKeyRef:
                    name: "{{ include "visops.fullname" . | trim }}-config"
                    key: AUTH_TRUST_HOST
            - name: AUTH_URL
              valueFrom:
                configMapKeyRef:
                    name: "{{ include "visops.fullname" . | trim }}-config"
                    key: AUTH_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: "{{ include "visops.fullname" . | trim }}-secret"
                  key: RABBITMQ_URL
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: "{{ include "visops.fullname" . | trim }}-pvc"
      imagePullSecrets:
        - name: registry-secret
