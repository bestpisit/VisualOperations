apiVersion: v1
kind: Service
metadata:
  name: "{{ include "visops.fullname" . | trim }}-service"
  labels:
    app: "{{ include "visops.fullname" . | trim }}"
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
  selector:
    app: "{{ include "visops.fullname" . | trim }}"